services:
  - type: web
    name: astrologist-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AWS_REGION
        sync: false        # set manually in Render dashboard
      - key: AWS_ACCESS_KEY_ID
        sync: false        # set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false        # set manually in Render dashboard
      - key: DYNAMODB_TABLE
        value: astrologist-customers
